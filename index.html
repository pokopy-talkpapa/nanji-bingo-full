<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>とけいビンゴ（なんじ・なんじはん）</title>
  <style>
    :root{
      --dark:#111;
      --soft:#ececec;
      --muted:#666;
      --accent:#2b66ff;
      --chip:#eef2ff;
      --line:#e7eaf3;
    }
    *{box-sizing:border-box;}
    body{
      margin:0;
      font-family:system-ui,-apple-system,"Noto Sans JP",sans-serif;
      background:#fff;
      color:var(--dark);
    }

    .wrap{
      max-width:760px;
      margin:0 auto;
      padding:16px 16px 28px;
    }
    .main{display:flex;flex-direction:column;align-items:center;gap:10px;}

    .title{font-weight:950;font-size:22px;margin:0;text-align:center;letter-spacing:.2px;}

    /* モードボタン */
    .modes{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin:2px 0;}
    .modeBtn{
      border:1px solid var(--line);background:#fff;color:var(--dark);
      padding:10px 14px;border-radius:999px;font-weight:900;font-size:14px;
      font-family:inherit;cursor:pointer;min-width:110px;
      transition:background .15s,border-color .15s;
    }
    .modeBtn.active{background:var(--chip);border-color:rgba(43,102,255,.35);}
    .modeBtn:active{transform:translateY(1px);}
    .modeBtn:disabled{opacity:.55;cursor:default;}

    /* トグルボタン */
    .toggles{display:flex;flex-wrap:wrap;justify-content:center;gap:8px;margin:0;}
    .togBtn{
      border:2px solid #ccc;border-radius:999px;background:#fff;
      color:var(--muted);font-family:inherit;font-size:13px;font-weight:900;
      padding:6px 14px;cursor:pointer;
      transition:background .15s,color .15s,border-color .15s;
    }
    .togBtn.on{background:var(--dark);color:#fff;border-color:var(--dark);}

    /* 時計 — 横幅いっぱいに広げる */
    .clock-wrap{
      position:relative;
      width:min(72vh, 96vw);
      aspect-ratio:1/1;
      margin:4px auto 2px;
    }
    .clock-wrap img,.clock-wrap svg.overlay{
      position:absolute;inset:0;width:100%;height:100%;
      pointer-events:none;user-select:none;-webkit-user-drag:none;
    }
    .hand{transform-origin:50% 50%;}

    /* 答えテキスト */
    .readout{
      text-align:center;font-size:clamp(28px,6vw,44px);
      font-weight:950;letter-spacing:2px;margin:2px 0;min-height:48px;
    }

    /* りれき */
    .historyWrap{
      width:min(560px,96vw);border:1px solid var(--line);border-radius:14px;
      padding:10px 12px;background:#fff;
    }
    .historyTitle{font-size:13px;font-weight:900;color:var(--muted);margin-bottom:6px;text-align:left;}
    .historyBox{display:flex;flex-wrap:wrap;gap:8px;min-height:28px;align-items:center;}
    .histChip{
      background:var(--chip);border:1px solid rgba(43,102,255,.22);
      color:var(--dark);font-weight:900;font-size:13px;
      padding:5px 10px;border-radius:999px;
    }
    .histEmpty{color:var(--muted);font-size:13px;font-weight:800;opacity:.8;}

    /* ボタンエリア */
    .btnArea{width:min(560px,96vw);display:flex;flex-direction:column;gap:10px;}
    .mainBtn{
      width:100%;border:0;border-radius:14px;padding:14px;
      font-size:18px;font-weight:900;cursor:pointer;font-family:inherit;
      background:var(--accent);color:#fff;
      box-shadow:0 8px 16px rgba(43,102,255,.18);
      transition:background .15s,opacity .15s;
    }
    .mainBtn:hover{background:#1f4fe0;}
    .mainBtn:active{transform:translateY(1px);}
    .mainBtn:disabled{opacity:.65;cursor:default;}
    .resetBtn{
      width:100%;border:0;border-radius:14px;padding:12px;
      font-size:15px;font-weight:900;cursor:pointer;font-family:inherit;
      background:var(--soft);color:var(--dark);
    }
    .resetBtn:hover{background:#e0e0e0;}
    .resetBtn:disabled{opacity:.55;cursor:default;}
  </style>
</head>
<body>
<div class="wrap">
  <div class="main">

    <div class="title">とけいビンゴ</div>

    <!-- モード（切替してもりれき・プールはリセットしない） -->
    <div class="modes">
      <button class="modeBtn active" id="modeHour">○じだけ</button>
      <button class="modeBtn"        id="modeHalf">○じはんだけ</button>
      <button class="modeBtn"        id="modeAll">ぜんぶ</button>
    </div>

    <!-- トグル -->
    <div class="toggles">
      <button class="togBtn on" id="tog-answer">こたえ</button>
      <button class="togBtn on" id="tog-donut-all">輪ごと</button>
      <button class="togBtn on" id="tog-donut-text">○じだけ</button>
      <button class="togBtn on" id="tog-nums">すうじ</button>
    </div>

    <!-- 時計 -->
    <div class="clock-wrap">
      <img src="clock-face.png" alt="文字盤">

      <!-- すうじ隠し -->
      <svg class="overlay" id="overlay-nums" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <circle cx="50" cy="50" r="36" fill="none" stroke="white" stroke-width="15"/>
      </svg>

      <!-- 輪ごと隠し -->
      <svg class="overlay" id="overlay-donut-all" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <circle cx="50" cy="50" r="30" fill="white"/>
      </svg>

      <!-- ○じだけ隠し（外縁・区切り線は再描画） -->
      <svg class="overlay" id="overlay-donut-text" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <circle cx="50" cy="50" r="24" fill="white"/>
        <circle cx="50" cy="50" r="23.7" fill="none" stroke="#111" stroke-width="0.25"/>
        <circle cx="50" cy="50" r="16.2" fill="none" stroke="#111" stroke-width="0.22"/>
        <line x1="50"    y1="33.8"  x2="50"    y2="26.3"  stroke="#111" stroke-width="0.2"/>
        <line x1="58.10" y1="35.97" x2="61.85" y2="29.48" stroke="#111" stroke-width="0.2"/>
        <line x1="64.03" y1="41.90" x2="70.52" y2="38.15" stroke="#111" stroke-width="0.2"/>
        <line x1="66.20" y1="50"    x2="73.70" y2="50"    stroke="#111" stroke-width="0.2"/>
        <line x1="64.03" y1="58.10" x2="70.52" y2="61.85" stroke="#111" stroke-width="0.2"/>
        <line x1="58.10" y1="64.03" x2="61.85" y2="70.52" stroke="#111" stroke-width="0.2"/>
        <line x1="50"    y1="66.20" x2="50"    y2="73.70" stroke="#111" stroke-width="0.2"/>
        <line x1="41.90" y1="64.03" x2="38.15" y2="70.52" stroke="#111" stroke-width="0.2"/>
        <line x1="35.97" y1="58.10" x2="29.48" y2="61.85" stroke="#111" stroke-width="0.2"/>
        <line x1="33.80" y1="50"    x2="26.30" y2="50"    stroke="#111" stroke-width="0.2"/>
        <line x1="35.97" y1="41.90" x2="29.48" y2="38.15" stroke="#111" stroke-width="0.2"/>
        <line x1="41.90" y1="35.97" x2="38.15" y2="29.48" stroke="#111" stroke-width="0.2"/>
      </svg>

      <img id="hand-long"  class="hand" src="clock-hand-long.png"  alt="長針">
      <img id="hand-short" class="hand" src="clock-hand-short.png" alt="短針">
    </div>

    <!-- 答えテキスト -->
    <div class="readout" id="readout">いま なんじ？</div>

    <!-- りれき -->
    <div class="historyWrap">
      <div class="historyTitle">りれき</div>
      <div class="historyBox" id="historyBox"></div>
    </div>

    <!-- ボタン -->
    <div class="btnArea">
      <button class="mainBtn"  id="mainBtn">スタート</button>
      <button class="resetBtn" id="resetBtn">リセット</button>
    </div>

  </div>
</div>

<script>
(() => {
  // ─── DOM参照 ───
  const handShort  = document.getElementById('hand-short');
  const handLong   = document.getElementById('hand-long');
  const readout    = document.getElementById('readout');
  const mainBtn    = document.getElementById('mainBtn');
  const resetBtn   = document.getElementById('resetBtn');
  const historyBox = document.getElementById('historyBox');
  const modeHour   = document.getElementById('modeHour');
  const modeHalf   = document.getElementById('modeHalf');
  const modeAll    = document.getElementById('modeAll');

  const HIRA = [
    "","いちじ","にじ","さんじ","よじ","ごじ",
    "ろくじ","しちじ","はちじ","くじ",
    "じゅうじ","じゅういちじ","じゅうにじ"
  ];
  function timeToDisplay(h, m){
    return HIRA[h] + (m === 0 ? "" : "はん");
  }

  // ─── 効果音 ───
  let audioCtx = null;
  function getCtx(){
    if (!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    if (audioCtx.state === "suspended") audioCtx.resume().catch(()=>{});
    return audioCtx;
  }
  function beep({freq=880, dur=0.08, type="sine", gain=0.08} = {}){
    const ctx = getCtx(), t0 = ctx.currentTime;
    const osc = ctx.createOscillator(), g = ctx.createGain();
    osc.type = type; osc.frequency.setValueAtTime(freq, t0);
    g.gain.setValueAtTime(0.0001, t0);
    g.gain.exponentialRampToValueAtTime(gain, t0 + 0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    osc.connect(g); g.connect(ctx.destination);
    osc.start(t0); osc.stop(t0 + dur + 0.02);
  }
  function sfxStop(){
    beep({freq:880, dur:0.06, type:"sine", gain:0.07});
    setTimeout(()=>beep({freq:1046, dur:0.09, type:"triangle", gain:0.09}), 80);
  }
  function sfxAnswer(){ beep({freq:1046, dur:0.085, type:"triangle", gain:0.09}); }

  // ─── 針の状態（累積minutes） ───
  let curMinutes = 0;
  let curH = 12, curM = 0;

  function setHandsDirect(minutes){
    handLong.style.transform  = `rotate(${minutes * 6}deg)`;
    handShort.style.transform = `rotate(${minutes * 0.5}deg)`;
  }

  function setTimeInstant(hour, minute){
    handLong.style.transition  = 'none';
    handShort.style.transition = 'none';
    const targetClock = (hour % 12) * 60 + minute;
    const curClock    = ((curMinutes % 720) + 720) % 720;
    const delta       = (((targetClock - curClock) % 720) + 720) % 720;
    curMinutes += delta;
    curH = hour; curM = minute;
    setHandsDirect(curMinutes);
    requestAnimationFrame(()=>{
      handLong.style.transition  = '';
      handShort.style.transition = '';
    });
  }

  // ─── スピン ───
  let isSpinning  = false;
  let spinRAF     = null;
  let spinTarget  = null; // 次の出題（スタート時に確定）
  let isStopping  = false; // 減速アニメーション中

  const SPIN_SPEED = 2.5; // 毎フレームのminutes増分（長針は×6度）

  function spinFrame(){
    curMinutes += SPIN_SPEED;
    setHandsDirect(curMinutes);
    if (isSpinning) spinRAF = requestAnimationFrame(spinFrame);
  }

  function startSpin(){
    getCtx();
    spinTarget = pickNext();
    isSpinning = true;
    isStopping = false;

    // CSS transitionを切ってrAFで直接操作
    handLong.style.transition  = 'none';
    handShort.style.transition = 'none';

    readout.textContent = 'いま なんじ？';
    mainBtn.textContent = 'ストップ';
    lockUI(true);
    mainBtn.disabled = false; // ストップだけ押せるように

    spinRAF = requestAnimationFrame(spinFrame);
  }

  function stopSpin(){
    if (!isSpinning || isStopping) return;
    isStopping = true;
    isSpinning = false;
    cancelAnimationFrame(spinRAF);

    sfxStop();

    // 現在位置から前進方向でtargetへ
    const targetClock = (spinTarget.h % 12) * 60 + spinTarget.m;
    const curClock    = ((curMinutes % 720) + 720) % 720;
    let delta = (((targetClock - curClock) % 720) + 720) % 720;
    if (delta === 0) delta = 720;

    // 最短0.8s〜最長2.2sの減速アニメーション
    const dur = Math.min(2200, Math.max(800, delta * 10));
    handLong.style.transition  = `transform ${dur}ms cubic-bezier(.08,.92,.3,1)`;
    handShort.style.transition = `transform ${dur}ms cubic-bezier(.08,.92,.3,1)`;

    curMinutes += delta;
    curH = spinTarget.h;
    curM = spinTarget.m;
    setHandsDirect(curMinutes);

    // アニメーション完了後に答えを表示
    setTimeout(()=>{
      isStopping = false;
      showAnswer();
    }, dur + 80);
  }

  // ─── ビンゴ状態 ───
  let history       = [];
  let currentMode   = 'hour';
  const pools = { hour:[], half:[], all:[] };

  function buildPoolItems(mode){
    const hours = Array.from({length:12}, (_,i) => i+1);
    if (mode === 'hour') return hours.map(h => ({h, m:0}));
    if (mode === 'half') return hours.map(h => ({h, m:30}));
    return hours.flatMap(h => [{h, m:0}, {h, m:30}]);
  }
  function shuffle(arr){
    for (let i = arr.length-1; i > 0; i--){
      const j = Math.floor(Math.random() * (i+1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }
  function ensurePool(mode){
    if (pools[mode].length === 0) pools[mode] = shuffle(buildPoolItems(mode));
  }
  function pickNext(){
    ensurePool(currentMode);
    return pools[currentMode].shift();
  }

  function renderHistory(){
    historyBox.innerHTML = '';
    if (history.length === 0){
      const d = document.createElement('div');
      d.className = 'histEmpty'; d.textContent = 'まだ でてないよ';
      historyBox.appendChild(d);
      return;
    }
    history.forEach(t => {
      const chip = document.createElement('div');
      chip.className = 'histChip'; chip.textContent = timeToDisplay(t.h, t.m);
      historyBox.appendChild(chip);
    });
  }

  function lockUI(locked){
    mainBtn.disabled  = locked;
    resetBtn.disabled = locked;
    modeHour.disabled = locked;
    modeHalf.disabled = locked;
    modeAll.disabled  = locked;
  }

  function showAnswer(){
    sfxAnswer();
    const jp = timeToDisplay(curH, curM);
    readout.textContent = jp;
    history.push({h:curH, m:curM});
    renderHistory();
    mainBtn.textContent = 'スタート';
    lockUI(false);
  }

  // ─── メインボタン（スタート / ストップ） ───
  mainBtn.addEventListener('click', () => {
    if (isStopping) return;
    if (!isSpinning){
      startSpin();
    } else {
      stopSpin();
    }
  });

  // ─── リセット ───
  resetBtn.addEventListener('click', () => {
    if (isSpinning || isStopping) return;
    pools.hour = shuffle(buildPoolItems('hour'));
    pools.half = shuffle(buildPoolItems('half'));
    pools.all  = shuffle(buildPoolItems('all'));
    history = [];
    readout.textContent = 'いま なんじ？';
    mainBtn.textContent = 'スタート';
    lockUI(false);
    renderHistory();
    setTimeInstant(12, 0);
  });

  // ─── モード切替（プール・りれきはそのまま） ───
  function setMode(m){
    currentMode = m;
    modeHour.classList.toggle('active', m === 'hour');
    modeHalf.classList.toggle('active', m === 'half');
    modeAll.classList.toggle('active',  m === 'all');
  }
  modeHour.addEventListener('click', () => { if (!isSpinning && !isStopping) setMode('hour'); });
  modeHalf.addEventListener('click', () => { if (!isSpinning && !isStopping) setMode('half'); });
  modeAll.addEventListener('click',  () => { if (!isSpinning && !isStopping) setMode('all');  });

  // ─── トグル ───
  function setupToggle(btnId, targetId, isReadout){
    const btn    = document.getElementById(btnId);
    const target = document.getElementById(targetId);
    let on = true;
    if (!isReadout) target.style.display = 'none';
    btn.addEventListener('click', () => {
      on = !on;
      btn.classList.toggle('on', on);
      if (isReadout){ target.style.visibility = on ? 'visible' : 'hidden'; }
      else          { target.style.display    = on ? 'none'    : 'block';  }
    });
  }
  setupToggle('tog-answer',     'readout',            true);
  setupToggle('tog-donut-all',  'overlay-donut-all',  false);
  setupToggle('tog-donut-text', 'overlay-donut-text', false);
  setupToggle('tog-nums',       'overlay-nums',        false);

  // ─── 初期化 ───
  pools.hour = shuffle(buildPoolItems('hour'));
  pools.half = shuffle(buildPoolItems('half'));
  pools.all  = shuffle(buildPoolItems('all'));
  renderHistory();
  setTimeInstant(12, 0);
})();
</script>
</body>
</html>
